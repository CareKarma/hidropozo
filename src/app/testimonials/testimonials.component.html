<div class="flex flex-wrap justify-center gap-8 max-w-6xl mx-auto">

  @for (t of testimonials; track t.name) {
    <figure class="w-full sm:w-96 bg-white rounded-2xl border border-slate-200/70 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 overflow-hidden flex flex-col">

      <!-- Línea de acento (sistema azul → naranja) -->
      <div class="h-1.5 bg-gradient-to-r from-[#0B3B4E] to-[#f59e0b]"></div>

      <div class="p-7 flex flex-col flex-1">

        <!-- Comilla + insignia "Google" (reseña verificada) -->
        <div class="flex items-start justify-between mb-3">
          <i class="fas fa-quote-left text-3xl text-[#f59e0b]/40"></i>
          <span class="inline-flex items-center gap-1.5 bg-slate-50 border border-slate-200 rounded-full px-2.5 py-1">
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span class="text-[11px] text-gray-500 font-medium">Google</span>
          </span>
        </div>

        <!-- Cita -->
        <blockquote class="text-gray-700 leading-relaxed flex-1 mb-5">
          {{ t.quote }}
        </blockquote>

        <!-- Estrellas -->
        <div class="flex gap-1 mb-4" [attr.aria-label]="t.stars + ' de 5 estrellas'">
          @for (s of starsArray(t.stars); track $index) {
            <i class="fas fa-star text-[#f59e0b] text-sm"></i>
          }
        </div>

        <!-- Autor -->
        <figcaption class="flex items-center gap-3 pt-4 border-t border-gray-100">
          @if (t.photoUrl) {
            <img [src]="t.photoUrl" [alt]="t.name"
                 class="w-10 h-10 rounded-full object-cover shrink-0 ring-2 ring-[#0B3B4E]/10">
          } @else {
            <span class="w-10 h-10 rounded-full bg-[#0B3B4E] text-white flex items-center justify-center shrink-0 font-semibold text-sm">
              {{ initials(t.name) }}
            </span>
          }
          <div>
            <p class="font-bold text-[#0B3B4E] leading-tight">{{ t.name }}</p>
            <p class="text-xs text-gray-500">{{ t.role }}</p>
          </div>
        </figcaption>

      </div>
    </figure>
  }

</div>
