<div class="flex flex-wrap justify-center gap-8 max-w-6xl mx-auto">

  @for (t of testimonials; track t.quote) {
    <figure class="relative w-full sm:w-96 bg-white rounded-2xl shadow-md hover:shadow-xl transition-shadow duration-300 p-8 flex flex-col">

      <!-- Comilla decorativa -->
      <i class="fas fa-quote-left text-3xl text-[#f59e0b]/30 mb-4"></i>

      <!-- Cita -->
      <blockquote class="text-gray-700 leading-relaxed flex-1 mb-6">
        {{ t.quote }}
      </blockquote>

      <!-- Estrellas -->
      <div class="flex gap-1 mb-4" [attr.aria-label]="t.stars + ' de 5 estrellas'">
        @for (s of starsArray(t.stars); track $index) {
          <i class="fas fa-star text-[#f59e0b] text-sm"></i>
        }
      </div>

      <!-- Autor -->
      <figcaption class="flex items-center gap-3 pt-4 border-t border-gray-100">
        <span class="w-10 h-10 rounded-full bg-[#0B3B4E] text-white flex items-center justify-center shrink-0">
          <i class="fas fa-user text-sm"></i>
        </span>
        <div>
          <p class="font-bold text-[#0B3B4E] leading-tight">{{ t.name }}</p>
          <p class="text-xs text-gray-500">{{ t.role }}</p>
        </div>
      </figcaption>

    </figure>
  }

</div>
