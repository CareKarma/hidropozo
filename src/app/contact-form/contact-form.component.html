<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">

  <!-- Franja superior decorativa con colores de la marca -->
  <div class="h-2 bg-gradient-to-r from-[#0B3B4E] via-[#1a5e78] to-[#f59e0b]"></div>

  <form (submit)="sendEmail($event)" class="p-8 md:p-10 space-y-6">

    <!-- Nombre -->
    <div class="space-y-1.5">
      <label for="name" class="block text-sm font-semibold text-gray-700 uppercase tracking-wide">Nombre</label>
      <input type="text" id="name" name="name" required
             placeholder="Su nombre completo"
             class="w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:border-[#0B3B4E] focus:ring-2 focus:ring-[#0B3B4E]/20 transition duration-200 text-sm">
    </div>

    <!-- Email -->
    <div class="space-y-1.5">
      <label for="email" class="block text-sm font-semibold text-gray-700 uppercase tracking-wide">Email</label>
      <input type="email" id="email" name="email" required
             placeholder="ejemplo@correo.com"
             class="w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:border-[#0B3B4E] focus:ring-2 focus:ring-[#0B3B4E]/20 transition duration-200 text-sm">
    </div>

    <!-- Mensaje / Detalles -->
    <div class="space-y-1.5">
      <label for="message" class="block text-sm font-semibold text-gray-700 uppercase tracking-wide">Mensaje</label>
      <textarea id="message" name="details" required rows="5"
                [(ngModel)]="detailsValue"
                placeholder="Cuéntenos en qué podemos ayudarle..."
                class="w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:border-[#0B3B4E] focus:ring-2 focus:ring-[#0B3B4E]/20 transition duration-200 text-sm resize-none"></textarea>
    </div>

    <!-- Botón enviar -->
    <div class="text-center pt-2">
      <button type="submit" [disabled]="isSending"
              class="px-10 py-3.5 bg-[#0B3B4E] text-white font-bold rounded-xl hover:bg-[#0d4a62] focus:outline-none focus:ring-2 focus:ring-[#0B3B4E] focus:ring-offset-2 transition-all duration-200 hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100 text-sm tracking-wide">
        {{ isSending ? 'Enviando...' : 'Enviar Mensaje' }}
      </button>
    </div>

  </form>
</div>
