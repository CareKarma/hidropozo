<form (submit)="sendEmail($event)" class="max-w-lg mx-auto p-6 bg-white rounded-lg shadow-md">
  <div class="mb-4">
    <label for="name" class="block text-gray-700 font-bold mb-2">Nombre:</label>
    <input type="text" id="name" name="name" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>

  <div class="mb-4">
    <label for="email" class="block text-gray-700 font-bold mb-2">Email:</label>
    <input type="email" id="email" name="email" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>

  <div class="mb-4">
    <label for="message" class="block text-gray-700 font-bold mb-2">Detalles:</label>
    <textarea id="message" name="details" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
  </div>

  <div class="text-center">
    <button type="submit" class="px-6 py-2 bg-blue-500 text-white font-bold rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">Enviar</button>
  </div>
</form>
