<div class="max-w-lg mx-auto p-8 bg-white rounded-xl shadow-2xl space-y-6 mb-12">
  <form (submit)="sendEmail($event)" class="space-y-6">
    <div class="space-y-2">
      <label for="name" class="block text-lg font-semibold text-gray-800">Nombre:</label>
      <input type="text" id="name" name="name" required
             class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition duration-200">
    </div>

    <div class="space-y-2">
      <label for="email" class="block text-lg font-semibold text-gray-800">Email:</label>
      <input type="email" id="email" name="email" required
             class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition duration-200">
    </div>

    <div class="space-y-2">
      <label for="message" class="block text-lg font-semibold text-gray-800">Detalles:</label>
      <textarea id="message" name="details" required
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition duration-200" rows="4"></textarea>
    </div>

    <div class="text-center">
      <button type="submit"
              class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 transform hover:scale-105">
        Enviar
      </button>
    </div>
  </form>
</div>
