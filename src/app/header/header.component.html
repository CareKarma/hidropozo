<div class="w-full bg-[#cddbee] shadow-sm">
  <header class="header">
      <div class="container mx-auto flex items-center justify-between py-4 px-4 md:px-8">
          <!-- Logo -->
          <img src="/assets/logo.JPG" alt="Hidropozo Logo" class="h-12 md:h-16">

          <!-- Nombre de la empresa (visible en desktop) -->
          <!-- <div class="hidden md:block text-xl font-bold text-[#1e3a8a]">
              Hidropozo SRL
          </div> -->

          <!-- Menú de navegación (visible en desktop) -->
          <div class="hidden md:flex items-center gap-8">
              <a href="javascript:void(0)" (click)="scrollToSection('#inicio')" class="text-[#1e3a8a] hover:text-[#f59e0b] transition duration-300">Inicio</a>
              <a href="javascript:void(0)" (click)="scrollToSection('#servicios')" class="text-[#1e3a8a] hover:text-[#f59e0b] transition duration-300">Servicios</a>
              <a href="javascript:void(0)" (click)="scrollToSection('#nosotros')" class="text-[#1e3a8a] hover:text-[#f59e0b] transition duration-300">Nosotros</a>
              <a href="javascript:void(0)" (click)="scrollToSection('#contacto')" class="text-[#1e3a8a] hover:text-[#f59e0b] transition duration-300">Contacto</a>
          </div>

          <!-- Botón de menú (visible en móvil) -->
          <div class="md:hidden">
              <button class="text-[#1e3a8a] hover:text-[#f59e0b] focus:outline-none transition duration-300"
                  type="button" data-drawer-target="drawer-navigation" data-drawer-show="drawer-navigation"
                  aria-controls="drawer-navigation">
                  <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                  </svg>
              </button>
          </div>
      </div>

      <!-- Menú móvil (drawer) -->
      <div id="drawer-navigation"
          class="fixed top-0 left-0 z-40 w-64 h-screen p-4 overflow-y-auto transition-transform -translate-x-full bg-white shadow-lg"
          tabindex="-1" aria-labelledby="drawer-navigation-label">
          <h5 id="drawer-navigation-label" class="text-lg font-semibold text-[#1e3a8a] uppercase">Menu</h5>
          <button type="button" data-drawer-hide="drawer-navigation" aria-controls="drawer-navigation"
              class="text-gray-500 hover:text-[#f59e0b] focus:outline-none transition duration-300 absolute top-4 right-4">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
          </button>
          <div class="py-4 overflow-y-auto">
              <ul class="space-y-3">
                  <li>
                      <a href="javascript:void(0)" (click)="scrollToSection('#inicio')"
                          class="flex items-center p-2 text-[#1e3a8a] hover:bg-[#f59e0b] hover:text-white rounded-lg transition duration-300">
                          <span class="ml-3">Inicio</span>
                      </a>
                  </li>
                  <li>
                      <a href="javascript:void(0)" (click)="scrollToSection('#servicios')"
                          class="flex items-center p-2 text-[#1e3a8a] hover:bg-[#f59e0b] hover:text-white rounded-lg transition duration-300">
                          <span class="ml-3">Servicios</span>
                      </a>
                  </li>
                  <li>
                      <a href="javascript:void(0)" (click)="scrollToSection('#nosotros')"
                          class="flex items-center p-2 text-[#1e3a8a] hover:bg-[#f59e0b] hover:text-white rounded-lg transition duration-300">
                          <span class="ml-3">Nosotros</span>
                      </a>
                  </li>
                  <li>
                      <a href="javascript:void(0)" (click)="scrollToSection('#contacto')"
                          class="flex items-center p-2 text-[#1e3a8a] hover:bg-[#f59e0b] hover:text-white rounded-lg transition duration-300">
                          <span class="ml-3">Contacto</span>
                      </a>
                  </li>
              </ul>
          </div>
      </div>
  </header>
</div>
