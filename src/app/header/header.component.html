<!-- El header es fixed por CSS (.header), este tag es el host del componente -->
<header class="header" [class.scrolled]="scrolled">
  <div class="container mx-auto flex items-center justify-between h-[72px] px-4 md:px-8">

    <!-- Logo (versión blanca para fondo oscuro, sin contenedor) -->
    <a href="javascript:void(0)" (click)="scrollToSection('#inicio')" class="flex items-center" aria-label="Hidropozo SRL — Inicio">
      <img src="/assets/logo-white.png" alt="Hidropozo SRL" class="h-9 w-auto">
    </a>

    <!-- Navegación desktop -->
    <nav class="hidden md:flex items-center gap-6">
      <a href="javascript:void(0)" (click)="scrollToSection('#inicio')"
         class="nav-link text-sm font-semibold uppercase tracking-wider transition-colors duration-300 hover:text-[#f59e0b]"
         [class.active]="activeSection === 'inicio'">Inicio</a>
      <a href="javascript:void(0)" (click)="scrollToSection('#servicios')"
         class="nav-link text-sm font-semibold uppercase tracking-wider transition-colors duration-300 hover:text-[#f59e0b]"
         [class.active]="activeSection === 'servicios'">Servicios</a>
      <a href="javascript:void(0)" (click)="scrollToSection('#proyectos')"
         class="nav-link text-sm font-semibold uppercase tracking-wider transition-colors duration-300 hover:text-[#f59e0b]"
         [class.active]="activeSection === 'proyectos'">Proyectos</a>
      <a href="javascript:void(0)" (click)="scrollToSection('#nosotros')"
         class="nav-link text-sm font-semibold uppercase tracking-wider transition-colors duration-300 hover:text-[#f59e0b]"
         [class.active]="activeSection === 'nosotros'">Nosotros</a>
      <!-- Botón CTA destacado para Contacto -->
      <a href="javascript:void(0)" (click)="scrollToSection('#form-contacto', true)"
         class="px-5 py-2 bg-[#f59e0b] hover:bg-[#d97706] text-white text-sm font-bold rounded-lg transition-all duration-300 hover:shadow-lg">
        Contacto
      </a>
    </nav>

    <!-- Botón hamburguesa (móvil) -->
    <button type="button" (click)="toggleMobileMenu()"
            class="md:hidden text-white focus:outline-none p-2 rounded-lg hover:bg-white/10 transition"
            aria-label="Abrir menú de navegación">
      @if (!isMobileMenuOpen) {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      } @else {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      }
    </button>
  </div>

  <!-- Menú móvil desplegable -->
  @if (isMobileMenuOpen) {
    <nav class="md:hidden border-t border-white/20 bg-[#0B3B4E] px-4 py-3 flex flex-col gap-1">
      <a href="javascript:void(0)" (click)="scrollToSection('#inicio')"
         class="nav-link py-3 px-3 rounded-lg text-sm font-semibold uppercase tracking-wider transition-all duration-200 hover:bg-white/10 hover:text-[#f59e0b]"
         [class.active]="activeSection === 'inicio'">Inicio</a>
      <a href="javascript:void(0)" (click)="scrollToSection('#servicios')"
         class="nav-link py-3 px-3 rounded-lg text-sm font-semibold uppercase tracking-wider transition-all duration-200 hover:bg-white/10 hover:text-[#f59e0b]"
         [class.active]="activeSection === 'servicios'">Servicios</a>
      <a href="javascript:void(0)" (click)="scrollToSection('#proyectos')"
         class="nav-link py-3 px-3 rounded-lg text-sm font-semibold uppercase tracking-wider transition-all duration-200 hover:bg-white/10 hover:text-[#f59e0b]"
         [class.active]="activeSection === 'proyectos'">Proyectos</a>
      <a href="javascript:void(0)" (click)="scrollToSection('#nosotros')"
         class="nav-link py-3 px-3 rounded-lg text-sm font-semibold uppercase tracking-wider transition-all duration-200 hover:bg-white/10 hover:text-[#f59e0b]"
         [class.active]="activeSection === 'nosotros'">Nosotros</a>
      <a href="javascript:void(0)" (click)="scrollToSection('#form-contacto', true)"
         class="mt-1 py-3 px-3 bg-[#f59e0b] hover:bg-[#d97706] text-white text-sm font-bold rounded-lg text-center transition">
        Contacto
      </a>
    </nav>
  }
</header>
