<div class="w-full bg-[#cddbee]">
    <header class="header">
        <div class="container mx-auto flex items-center justify-between py-4">
            <img src="assets/logo.jpg" alt="Hidropozo Logo" class="h-12">
            <div class="flex justify-between max-screen mx-auto w-full items-center">
                <div class="box">
                    Hidropozo SRL
                </div>
                <div class="flex md:hidden">
                    <!-- drawer init and show -->
                    <div class="text-center">
                        <button
                            class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800"
                            type="button" data-drawer-target="drawer-navigation" data-drawer-show="drawer-navigation"
                            aria-controls="drawer-navigation">
                            Menu
                        </button>
                    </div>

                    <!-- drawer component -->
                    <div id="drawer-navigation"
                        class="fixed top-0 left-0 z-40 w-64 h-screen p-4 overflow-y-auto transition-transform -translate-x-full bg-white dark:bg-gray-800"
                        tabindex="-1" aria-labelledby="drawer-navigation-label">
                        <h5 id="drawer-navigation-label"
                            class="text-base font-semibold text-gray-500 uppercase dark:text-gray-400">Menu</h5>
                        <button type="button" data-drawer-hide="drawer-navigation" aria-controls="drawer-navigation"
                            class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm p-1.5 absolute top-2.5 end-2.5 inline-flex items-center dark:hover:bg-gray-600 dark:hover:text-white">
                            <svg aria-hidden="true" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"
                                xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd"
                                    d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                                    clip-rule="evenodd"></path>
                            </svg>
                            <span class="sr-only">Close menu</span>
                        </button>
                        <div class="py-4 overflow-y-auto">
                            <ul class="space-y-2 font-medium">
                                <li>
                                    <a href="javascript:void(0)" (click)="scrollToSection('#inicio')"
                                        class="flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 group">
                                        <svg class="w-5 h-5 text-gray-500 transition duration-75 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white"
                                            aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor"
                                            viewBox="0 0 22 21">
                                        </svg>
                                        <span class="ms-3">Inicio</span>
                                    </a>
                                </li>
                                <li>
                                    <a href="javascript:void(0)" (click)="scrollToSection('#servicios')"
                                        class="flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 group">
                                        <svg class="shrink-0 w-5 h-5 text-gray-500 transition duration-75 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white"
                                            aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor"
                                            viewBox="0 0 18 18">
                                        </svg>
                                        <span class="flex-1 ms-3 whitespace-nowrap">Servicios</span>
                                    </a>
                                </li>
                                <li>
                                    <a href="javascript:void(0)" (click)="scrollToSection('#nosotros')"
                                        class="flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 group">
                                        <svg class="shrink-0 w-5 h-5 text-gray-500 transition duration-75 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white"
                                            aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor"
                                            viewBox="0 0 20 20">
                                        </svg>
                                        <span class="flex-1 ms-3 whitespace-nowrap">Nosotros</span>
                                    </a>
                                </li>
                                <li>
                                    <a href="javascript:void(0)" (click)="scrollToSection('#contacto')"
                                        class="flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 group">
                                        <svg class="shrink-0 w-5 h-5 text-gray-500 transition duration-75 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white"
                                            aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor"
                                            viewBox="0 0 20 18">
                                        </svg>
                                        <span class="flex-1 ms-3 whitespace-nowrap">Contacto</span>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>

                </div>
                <div class="hidden md:flex items-center gap-4">
                    <a href="javascript:void(0)" (click)="scrollToSection('#inicio')" class="text-gray-700 hover:text-blue-500">Inicio</a>
                    <a href="javascript:void(0)" (click)="scrollToSection('#servicios')" class="text-gray-700 hover:text-blue-500">Servicios</a>
                    <a href="javascript:void(0)" (click)="scrollToSection('#nosotros')" class="text-gray-700 hover:text-blue-500">Nosotros</a>
                    <a href="javascript:void(0)" (click)="scrollToSection('#contacto')" class="text-gray-700 hover:text-blue-500">Contacto</a>
                </div>
            </div>
        </div>
    </header>
</div>
