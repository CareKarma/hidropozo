@for (group of groups; track group.heading) {
  @if (group.items.length > 0) {
  <div class="max-w-6xl mx-auto mb-14 last:mb-0">

    <!-- Título del apartado -->
    <h3 class="font-display text-2xl md:text-3xl font-bold text-[#0B3B4E] mb-6 flex items-center gap-3">
      <span class="inline-block w-8 h-1 bg-[#f59e0b] rounded-full shrink-0"></span>
      {{ group.heading }}
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (item of visibleItems(group); track item.src) {
        <div class="group relative rounded-2xl overflow-hidden border border-slate-200/70 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 h-64 bg-[#0B3B4E]">

          @if (item.type === 'image') {
            <!-- Tarjeta de imagen (WebP con fallback a JPG) -->
            <picture>
              <source [srcset]="webp(item.src)" type="image/webp">
              <img [src]="item.src" [alt]="item.title" loading="lazy"
                   class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            </picture>
            <!-- Degradado + título del proyecto -->
            <div class="absolute inset-x-0 bottom-0 h-24 bg-gradient-to-t from-black/75 to-transparent pointer-events-none"></div>
            <span class="absolute bottom-3 left-4 right-4 text-white font-semibold text-sm leading-snug drop-shadow">{{ item.title }}</span>

          } @else {
            <!-- Tarjeta de video: portada nítida; el video solo se descarga al reproducir -->
            <video #videoEl [attr.src]="item.src" [attr.poster]="posterOf(item.src)"
                   preload="none" playsinline [muted]="true"
                   [controls]="item.playing" (play)="onPlay(videoEl)"
                   class="absolute inset-0 w-full h-full object-cover"></video>

            @if (!item.playing) {
              <!-- Overlay con botón de play y título (se oculta al reproducir) -->
              <button type="button" (click)="playVideo(item, videoEl)"
                      class="absolute inset-0 cursor-pointer focus:outline-none"
                      [attr.aria-label]="'Reproducir video: ' + item.title">
                <span class="absolute inset-0 bg-gradient-to-t from-black/75 via-black/15 to-black/25"></span>
                <span class="absolute inset-0 flex items-center justify-center">
                  <span class="w-16 h-16 rounded-full bg-[#f59e0b]/90 group-hover:bg-[#f59e0b] flex items-center justify-center transition-all duration-300 group-hover:scale-110 shadow-lg">
                    <i class="fas fa-play text-white text-xl ml-1"></i>
                  </span>
                </span>
                <span class="absolute bottom-3 left-4 right-4 text-left text-white font-semibold text-sm leading-snug drop-shadow">{{ item.title }}</span>
              </button>
            }
          }

        </div>
      }
    </div>

    @if (group.items.length > limit) {
      <div class="text-center mt-8">
        <button type="button" (click)="group.expanded = !group.expanded"
                class="inline-flex items-center gap-2 px-6 py-2.5 rounded-lg border-2 border-[#0B3B4E] text-[#0B3B4E] font-semibold hover:bg-[#0B3B4E] hover:text-white transition-colors duration-300">
          {{ group.expanded ? 'Ver menos' : 'Ver más' }}
          <i class="fas fa-chevron-down transition-transform duration-300" [class.rotate-180]="group.expanded"></i>
        </button>
      </div>
    }

  </div>
  }
}
