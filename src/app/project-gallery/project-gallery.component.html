@for (group of groups; track group.heading) {
  <div class="max-w-6xl mx-auto mb-14 last:mb-0">

    <!-- Título del apartado -->
    <h3 class="font-display text-2xl md:text-3xl font-bold text-[#0B3B4E] mb-6 flex items-center gap-3">
      <span class="inline-block w-8 h-1 bg-[#f59e0b] rounded-full shrink-0"></span>
      {{ group.heading }}
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (item of group.items; track item.src) {
        <div class="group relative rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition-shadow duration-300 h-64 bg-[#0B3B4E]">

          @if (item.type === 'image') {
            <!-- Tarjeta de imagen -->
            <img [src]="item.src" [alt]="item.title" loading="lazy"
                 class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent"></div>
            <span class="font-display absolute bottom-4 left-4 right-4 text-white font-bold text-lg drop-shadow">{{ item.title }}</span>

          } @else {
            <!-- Tarjeta de video -->
            <video #videoEl [attr.src]="item.src" preload="metadata" playsinline
                   [controls]="item.playing" (play)="onPlay(videoEl)"
                   class="absolute inset-0 w-full h-full object-cover"></video>

            @if (!item.playing) {
              <!-- Overlay con botón de play (se oculta al reproducir) -->
              <button type="button" (click)="playVideo(item, videoEl)"
                      class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-t from-black/70 via-black/20 to-black/30 cursor-pointer focus:outline-none"
                      [attr.aria-label]="'Reproducir video: ' + item.title">
                <span class="w-16 h-16 rounded-full bg-[#f59e0b]/90 group-hover:bg-[#f59e0b] flex items-center justify-center transition-all duration-300 group-hover:scale-110 shadow-lg">
                  <i class="fas fa-play text-white text-xl ml-1"></i>
                </span>
                <span class="font-display absolute bottom-4 left-4 right-4 text-white font-bold text-lg text-left drop-shadow">{{ item.title }}</span>
              </button>
            }
          }

        </div>
      }
    </div>

  </div>
}
