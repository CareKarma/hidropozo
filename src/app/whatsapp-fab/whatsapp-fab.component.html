<!-- Contenedor fijo abajo-derecha -->
<div class="fixed bottom-6 right-6 z-[60] flex flex-col items-end gap-3">

  <!-- Menú de líneas (se despliega al abrir) -->
  @if (isOpen) {
    <div class="flex flex-col gap-2 mb-1 animate-fab-in">
      @for (line of lines; track line.href) {
        <a [href]="line.href" target="_blank" rel="noopener noreferrer"
           (click)="close()"
           class="flex items-center gap-3 bg-white rounded-full shadow-lg pl-4 pr-2 py-2 hover:shadow-xl transition-shadow duration-200 group">
          <span class="text-sm font-semibold text-[#0B3B4E] whitespace-nowrap">{{ line.label }}</span>
          <span class="w-9 h-9 rounded-full bg-[#25D366] group-hover:bg-[#1ebe5a] flex items-center justify-center transition-colors duration-200">
            <i class="fab fa-whatsapp text-white text-lg"></i>
          </span>
        </a>
      }
    </div>
  }

  <!-- Botón principal -->
  <button type="button" (click)="toggle()"
          [attr.aria-expanded]="isOpen"
          aria-label="Contactar por WhatsApp"
          class="w-14 h-14 rounded-full bg-[#25D366] hover:bg-[#1ebe5a] shadow-lg hover:shadow-xl flex items-center justify-center transition-all duration-300 hover:scale-105 focus:outline-none focus:ring-4 focus:ring-[#25D366]/40">
    @if (!isOpen) {
      <i class="fab fa-whatsapp text-white text-3xl"></i>
    } @else {
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    }
  </button>

</div>
